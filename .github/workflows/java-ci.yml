# .github/workflows/java-ci.yml
# Runs Maven-based compile and test checks for the Java library catalog on GitHub Actions.
# Connects to: pom.xml, src/main/java/**, src/test/java/**
# Created: 2026-06-30
name: Java CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven test suite
        run: ./mvnw -q test
